<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* GLOBAL STYLES */
        body {
            margin: 0;
            padding: 0;
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a 50%, #020617);
            overflow: hidden;
            height: 100vh;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.4);
        }

        /* APP LAYOUT */
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: row;
        }

        /* SIDEBAR (GLASSMORPHISM & RESPONSIVE) */
        #sidebar {
            width: 260px;
            padding: 25px 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
            transition: all 0.3s ease;
        }

        #sidebar h2 {
            color: #eab308; /* Pikachu Yellow */
            font-size: 22px;
            margin: 0 0 25px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
        }

        #new-chat {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(59, 130, 246, 0.1));
            color: #06b6d4;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #new-chat:hover {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            border-color: transparent;
        }

        /* MAIN CONTENT AREA */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        /* CHAT AREA */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px 15%;
            display: flex;
            flex-direction: column;
            transition: padding 0.3s ease;
        }

        /* MESSAGES */
        .message {
            max-width: 75%;
            padding: 16px 22px;
            margin-bottom: 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 16px;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* USER MESSAGE */
        .user {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.25);
        }

        /* AI MESSAGE */
        .ai {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }

        /* THINKING STATUS */
        .thinking {
            color: #22d3ee !important;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .thinking i {
            animation: spin 1s linear infinite;
        }

        /* MARKDOWN RENDER STYLES */
        .ai h1, .ai h2, .ai h3 {
            color: #22d3ee;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .ai p {
            margin: 0 0 10px 0;
        }
        .ai p:last-child {
            margin-bottom: 0;
        }

        /* CODE BLOCK CONTAINER */
        pre {
            background: #090d16 !important;
            padding: 18px;
            border-radius: 12px;
            overflow-x: auto;
            position: relative;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        pre code {
            color: #34d399 !important;
            font-size: 14px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            line-height: 1.5;
            background: transparent !important;
            padding: 0 !important;
        }

        /* INLINE CODE */
        code {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
            color: #f43f5e;
            font-family: monospace;
            font-size: 14px;
        }

        /* COPY BUTTON */
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .copy-btn:hover {
            background: #06b6d4;
            color: white;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        /* INPUT AREA */
        #input-container {
            padding: 15px 15% 25px 15%;
            background: linear-gradient(to top, #020617 60%, transparent);
            transition: padding 0.3s ease;
        }

        #input-area {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #input-area:focus-within {
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.15);
        }

        #cmd {
            flex: 1;
            padding: 12px 15px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: transparent;
            color: white;
            font-size: 16px;
        }

        #cmd::placeholder {
            color: #94a3b8;
        }

        #input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }

        #cmd:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ANIMATIONS */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* RESPONSIVE MEDIA QUERIES (MOBILE FRIENDLY) */
        @media (max-width: 900px) {
            #chat-area { padding: 25px 5%; }
            #input-container { padding: 15px 5% 20px 5%; }
        }

        @media (max-width: 680px) {
            #app {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                height: auto;
                padding: 15px 20px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
                box-sizing: border-box;
            }
            #sidebar h2 {
                margin: 0;
                font-size: 20px;
            }
            #new-chat {
                width: auto;
                padding: 8px 16px;
                font-size: 14px;
            }
            .message {
                max-width: 90%;
                font-size: 15px;
                padding: 12px 16px;
            }
            #chat-area {
                padding: 20px 15px;
            }
            #input-container {
                padding: 10px 15px 15px 15px;
            }
            #cmd {
                padding: 10px 8px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

<div id="app">
    <div id="sidebar">
        <h2><i class="fa-solid fa-bolt"></i> Pikachu</h2>
        <button id="new-chat" onclick="newChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </button>
    </div>

    <div id="main">
        <div id="chat-area">
            <div class="message ai">
                👋 Hello! I am <b>Pikachu AI</b>.<br><br>
                How can I help you today?
            </div>
        </div>

        <div id="input-container">
            <div id="input-area">
                <input id="cmd" placeholder="Message Pikachu..." autocomplete="off">
                <button onclick="sendCommand()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    async function sendCommand() {
        let cmdInput = document.getElementById("cmd");
        let cmd = cmdInput.value;
        if (cmd.trim() === "") return;

        // DISABLE INPUT
        cmdInput.disabled = true;
        let chatArea = document.getElementById("chat-area");

        // USER MESSAGE
        chatArea.innerHTML += `
            <div class="message user">
                ${cmd}
            </div>
        `;

        // AI THINKING MESSAGE
        let thinkingId = "thinking-" + Date.now();
        chatArea.innerHTML += `
            <div class="message ai thinking" id="${thinkingId}">
                <i class="fa-solid fa-circle-notch"></i> Pikachu is thinking...
            </div>
        `;

        // AUTO SCROLL
        chatArea.scrollTop = chatArea.scrollHeight;
        cmdInput.value = "";

        try {
            // FETCH RESPONSE
            let response = await fetch(`/command/?command=${encodeURIComponent(cmd)}`);
            let data = await response.json();

            // GET THINKING ELEMENT & REPLACE IT
            let thinkingMessage = document.getElementById(thinkingId);
            let cleanResponse = data.response;

            // RENDER MARKDOWN
            thinkingMessage.classList.remove("thinking");
            thinkingMessage.innerHTML = marked.parse(cleanResponse);

            // ENABLE INPUT AGAIN
            cmdInput.disabled = false;
            cmdInput.focus();

            // ATTACH COPY BUTTONS
            attachCopyButtons();

        } catch (error) {
            console.log(error);
            let thinkingMessage = document.getElementById(thinkingId);
            if (thinkingMessage) {
                thinkingMessage.classList.remove("thinking");
                thinkingMessage.innerHTML = "<span style='color: #ef4444;'><i class='fa-solid fa-triangle-exclamation'></i> Error getting response.</span>";
            }
            cmdInput.disabled = false;
            cmdInput.focus();
        }

        // AUTO SCROLL
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function attachCopyButtons() {
        document.querySelectorAll("pre code").forEach((codeBlock) => {
            let pre = codeBlock.parentElement;
            if (pre.querySelector(".copy-btn")) return;

            let button = document.createElement("button");
            button.innerHTML = "<i class='fa-regular fa-copy'></i> Copy";
            button.className = "copy-btn";

            button.onclick = () => {
                navigator.clipboard.writeText(codeBlock.innerText);
                button.innerHTML = "<i class='fa-solid fa-check' style='color: #10b981;'></i> Copied";
                setTimeout(() => {
                    button.innerHTML = "<i class='fa-regular fa-copy'></i> Copy";
                }, 2000);
            };
            pre.appendChild(button);
        });
    }

    // ENTER KEY SUPPORT
    document.getElementById("cmd").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            sendCommand();
        }
    });

    // NEW CHAT FUNCTION
    function newChat() {
        let chatArea = document.getElementById("chat-area");
        chatArea.innerHTML = `
            <div class="message ai">
                👋 Hello! I am <b>Pikachu AI</b>.<br><br>
                How can I help you today?
            </div>
        `;
    }
</script>

</body>
</html>
